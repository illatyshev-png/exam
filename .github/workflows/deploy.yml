name: Deploy to cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for react-snap
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Build
        run: npm run build
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER || 'ftp.ilat.info' }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: dist/
          # Important: most cPanel FTP users are chrooted into a directory.
          # Use a path relative to that FTP root. Default: deploy into FTP root.
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
